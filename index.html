<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊記帳 App</title>
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 載入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- 載入 Babel 以便在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <!-- 加入 Firebase SDK 模組 -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    window.FirebaseUtils = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot };
    window.dispatchEvent(new Event('firebase-ready'));
  </script>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // --- 圖示元件 (改用內建 SVG 以確保 HTML 單檔即可運行) ---
    const Icon = ({ size = 24, className = "", children }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );
    const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
    const MapIcon = (p) => <Icon {...p}><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></Icon>;
    const Users = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
    const DollarSign = (p) => <Icon {...p}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></Icon>;
    const ArrowLeft = (p) => <Icon {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></Icon>;
    const Edit2 = (p) => <Icon {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></Icon>;
    const Trash2 = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></Icon>;
    const Calendar = (p) => <Icon {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></Icon>;
    const Coffee = (p) => <Icon {...p}><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></Icon>;
    const Bus = (p) => <Icon {...p}><path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4a2 2 0 0 0-2 2v10h3"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></Icon>;
    const Home = (p) => <Icon {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></Icon>;
    const ShoppingBag = (p) => <Icon {...p}><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></Icon>;
    const Ticket = (p) => <Icon {...p}><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></Icon>;
    const MoreHorizontal = (p) => <Icon {...p}><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></Icon>;
    const X = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
    const Check = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;

    // 預設分類與對應圖示
    const CATEGORIES = [
      { name: '飲食', icon: Coffee, color: 'text-orange-500', bg: 'bg-orange-100' },
      { name: '交通', icon: Bus, color: 'text-blue-500', bg: 'bg-blue-100' },
      { name: '住宿', icon: Home, color: 'text-indigo-500', bg: 'bg-indigo-100' },
      { name: '購物', icon: ShoppingBag, color: 'text-pink-500', bg: 'bg-pink-100' },
      { name: '娛樂', icon: Ticket, color: 'text-purple-500', bg: 'bg-purple-100' },
      { name: '其他', icon: MoreHorizontal, color: 'text-gray-500', bg: 'bg-gray-100' },
    ];

    const CURRENCIES = ['TWD', 'JPY', 'USD', 'KRW', 'EUR', 'HKD', 'THB', 'CNY'];

    function TravelExpenseTracker() {
      // 應用程式狀態
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [trips, setTrips] = useState([]);
      const [activeTripId, setActiveTripId] = useState(null);

      // 彈出視窗狀態
      const [isTripModalOpen, setIsTripModalOpen] = useState(false);
      const [isExpenseModalOpen, setIsExpenseModalOpen] = useState(false);
      const [isParticipantModalOpen, setIsParticipantModalOpen] = useState(false);
      
      // 全域訊息狀態 (取代原生的 alert 與 confirm)
      const [alertMessage, setAlertMessage] = useState('');
      const [confirmAction, setConfirmAction] = useState(null);

      // 表單狀態
      const [tripForm, setTripForm] = useState({ name: '', currencies: ['TWD'], participants: [''] });
      const [expenseForm, setExpenseForm] = useState({ id: null, name: '', amount: '', currency: 'TWD', payer: '', date: '', category: '飲食' });
      const [editingParticipants, setEditingParticipants] = useState([]);

      // --- Firebase 初始化與資料監聽 ---
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await window.FirebaseUtils.signInWithCustomToken(window.auth, __initial_auth_token);
            } else {
              await window.FirebaseUtils.signInAnonymously(window.auth);
            }
          } catch (e) {
            console.error("Auth error", e);
            setLoading(false);
          }
        };
        initAuth();
        
        const unsubscribe = window.FirebaseUtils.onAuthStateChanged(window.auth, (u) => {
          setUser(u);
          if (!u) setLoading(false);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        
        // 綁定「公開共用」的 Trips 集合 (所有使用者看同一個資料庫)
        const tripsRef = window.FirebaseUtils.collection(window.db, 'artifacts', window.appId, 'public', 'data', 'trips');
        const unsubscribe = window.FirebaseUtils.onSnapshot(tripsRef, (snapshot) => {
          const tripsData = [];
          snapshot.forEach(doc => tripsData.push(doc.data()));
          // 依照 ID (時間戳) 降序排序，最新的旅程在最上方
          tripsData.sort((a, b) => Number(b.id) - Number(a.id));
          setTrips(tripsData);
          setLoading(false);
        }, (error) => {
          console.error("Firestore error:", error);
          setLoading(false);
        });

        return () => unsubscribe();
      }, [user]);

      // 當前選中的旅程
      const activeTrip = useMemo(() => trips.find(t => t.id === activeTripId), [trips, activeTripId]);

      // 計算當前旅程的統計數據 (依幣值分類)
      const tripStats = useMemo(() => {
        if (!activeTrip) return {};
        const stats = {};
        activeTrip.currencies.forEach(curr => {
          const total = activeTrip.expenses
            .filter(e => e.currency === curr)
            .reduce((sum, exp) => sum + Number(exp.amount), 0);
          const average = activeTrip.participants.length > 0 ? total / activeTrip.participants.length : 0;
          stats[curr] = { total, average };
        });
        return stats;
      }, [activeTrip]);

      // 計算列表用的簡易統計 (只取有花費的幣值，或預設第一種)
      const getTripListTotals = (trip) => {
        const totals = {};
        trip.currencies.forEach(curr => {
          const sum = trip.expenses.filter(e => e.currency === curr).reduce((acc, e) => acc + Number(e.amount), 0);
          if (sum > 0) totals[curr] = sum;
        });
        if (Object.keys(totals).length === 0 && trip.currencies.length > 0) {
          totals[trip.currencies[0]] = 0; // 若都沒花費，顯示第一個幣值的 0
        }
        return totals;
      };

      // --- 旅程相關操作 ---
      const handleAddParticipant = () => {
        setTripForm({ ...tripForm, participants: [...tripForm.participants, ''] });
      };

      const handleParticipantChange = (index, value) => {
        const newParticipants = [...tripForm.participants];
        newParticipants[index] = value;
        setTripForm({ ...tripForm, participants: newParticipants });
      };

      const handleRemoveParticipant = (index) => {
        if (tripForm.participants.length <= 1) return;
        const newParticipants = tripForm.participants.filter((_, i) => i !== index);
        setTripForm({ ...tripForm, participants: newParticipants });
      };

      const toggleCurrency = (currency) => {
        let newCurrencies = [...tripForm.currencies];
        if (newCurrencies.includes(currency)) {
          if (newCurrencies.length > 1) { // 至少需保留一個幣值
            newCurrencies = newCurrencies.filter(c => c !== currency);
          }
        } else {
          newCurrencies.push(currency);
        }
        setTripForm({ ...tripForm, currencies: newCurrencies });
      };

      const saveTrip = async () => {
        if (!tripForm.name.trim()) {
          setAlertMessage('請輸入旅程名稱');
          return;
        }
        const validParticipants = tripForm.participants.filter(p => p.trim() !== '');
        if (validParticipants.length === 0) {
          setAlertMessage('請至少設定一位參與者');
          return;
        }

        const newTrip = {
          id: Date.now().toString(),
          name: tripForm.name,
          currencies: tripForm.currencies,
          participants: validParticipants,
          expenses: []
        };

        if (user) {
          try {
            // 儲存至公開共用途徑
            const tripRef = window.FirebaseUtils.doc(window.db, 'artifacts', window.appId, 'public', 'data', 'trips', newTrip.id);
            await window.FirebaseUtils.setDoc(tripRef, newTrip);
          } catch (e) {
            console.error("Error saving trip", e);
            setAlertMessage("儲存失敗");
          }
        }

        setIsTripModalOpen(false);
        setTripForm({ name: '', currencies: ['TWD'], participants: [''] });
      };

      const deleteTrip = (id) => {
        setConfirmAction({
          message: '確定要刪除這個旅程嗎？所有記帳資料將會消失。',
          action: async () => {
            if (user) {
              try {
                // 從公開共用途徑刪除
                const tripRef = window.FirebaseUtils.doc(window.db, 'artifacts', window.appId, 'public', 'data', 'trips', id);
                await window.FirebaseUtils.deleteDoc(tripRef);
                if (activeTripId === id) setActiveTripId(null);
              } catch (e) {
                console.error("Error deleting trip", e);
              }
            }
          }
        });
      };

      // --- 參與者管理相關操作 ---
      const openParticipantModal = () => {
        // 紀錄原始名稱以便後續比對修改
        setEditingParticipants(activeTrip.participants.map(p => ({ original: p, current: p })));
        setIsParticipantModalOpen(true);
      };

      const handleEditParticipantChange = (index, value) => {
        const newP = [...editingParticipants];
        newP[index].current = value;
        setEditingParticipants(newP);
      };

      const handleAddEditParticipant = () => {
        setEditingParticipants([...editingParticipants, { original: null, current: '' }]);
      };

      const handleRemoveEditParticipant = (index) => {
        if (editingParticipants.length <= 1) {
          setAlertMessage('至少需要一名參與者');
          return;
        }
        const newP = editingParticipants.filter((_, i) => i !== index);
        setEditingParticipants(newP);
      };

      const saveParticipants = async () => {
        const validParticipants = editingParticipants.filter(p => p.current.trim() !== '');
        if (validParticipants.length === 0) {
          setAlertMessage('請至少設定一位參與者');
          return;
        }

        const names = validParticipants.map(p => p.current.trim());
        if (new Set(names).size !== names.length) {
          setAlertMessage('參與者名稱不能重複');
          return;
        }

        // 建立名稱變更對應表
        const nameMap = {};
        validParticipants.forEach(p => {
          if (p.original && p.original !== p.current.trim()) {
            nameMap[p.original] = p.current.trim();
          }
        });

        // 同步更新已存在的消費明細支出人
        const updatedExpenses = activeTrip.expenses.map(exp => {
          if (nameMap[exp.payer]) {
            return { ...exp, payer: nameMap[exp.payer] };
          }
          return exp;
        });

        const updatedTrip = {
          ...activeTrip,
          participants: names,
          expenses: updatedExpenses
        };

        if (user) {
          try {
            // 更新至公開共用途徑
            const tripRef = window.FirebaseUtils.doc(window.db, 'artifacts', window.appId, 'public', 'data', 'trips', activeTripId);
            await window.FirebaseUtils.setDoc(tripRef, updatedTrip);
          } catch (e) {
            console.error("Error saving participants", e);
          }
        }
        
        setIsParticipantModalOpen(false);
      };

      // --- 消費明細相關操作 ---
      const openExpenseModal = (expense = null) => {
        if (expense) {
          setExpenseForm({ ...expense });
        } else {
          setExpenseForm({ 
            id: null, 
            name: '', 
            amount: '', 
            currency: activeTrip.currencies[0] || 'TWD', // 預設使用旅程的第一個幣值
            payer: activeTrip.participants[0] || '', 
            date: new Date().toISOString().split('T')[0], 
            category: '飲食' 
          });
        }
        setIsExpenseModalOpen(true);
      };

      const saveExpense = async () => {
        if (!expenseForm.name.trim() || !expenseForm.amount || !expenseForm.payer || !expenseForm.currency) {
          setAlertMessage('請填寫完整資訊');
          return;
        }

        const expenseData = {
          ...expenseForm,
          amount: Number(expenseForm.amount),
          id: expenseForm.id || Date.now().toString()
        };

        let newExpenses;
        if (expenseForm.id) {
          newExpenses = activeTrip.expenses.map(e => e.id === expenseForm.id ? expenseData : e);
        } else {
          newExpenses = [expenseData, ...activeTrip.expenses];
        }

        const updatedTrip = { ...activeTrip, expenses: newExpenses };

        if (user) {
          try {
            // 更新至公開共用途徑
            const tripRef = window.FirebaseUtils.doc(window.db, 'artifacts', window.appId, 'public', 'data', 'trips', activeTripId);
            await window.FirebaseUtils.setDoc(tripRef, updatedTrip);
          } catch (e) {
            console.error("Error saving expense", e);
          }
        }

        setIsExpenseModalOpen(false);
      };

      const deleteExpense = (expenseId) => {
        setConfirmAction({
          message: '確定要刪除這筆明細嗎？',
          action: async () => {
            const updatedTrip = { ...activeTrip, expenses: activeTrip.expenses.filter(e => e.id !== expenseId) };
            if (user) {
              try {
                // 更新至公開共用途徑
                const tripRef = window.FirebaseUtils.doc(window.db, 'artifacts', window.appId, 'public', 'data', 'trips', activeTripId);
                await window.FirebaseUtils.setDoc(tripRef, updatedTrip);
              } catch (e) {
                console.error("Error deleting expense", e);
              }
            }
          }
        });
      };

      const getCategoryIcon = (categoryName) => {
        const cat = CATEGORIES.find(c => c.name === categoryName) || CATEGORIES[CATEGORIES.length - 1];
        const IconComponent = cat.icon;
        return (
          <div className={`p-2 rounded-full ${cat.bg} ${cat.color}`}>
            <IconComponent size={20} />
          </div>
        );
      };

      // ================= 畫面渲染 =================

      const renderModals = () => (
        <React.Fragment>
          {/* Alert Modal */}
          {alertMessage && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-[60]">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-sm p-5 text-center">
                <p className="text-gray-800 mb-5">{alertMessage}</p>
                <button onClick={() => setAlertMessage('')} className="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors">
                  確定
                </button>
              </div>
            </div>
          )}

          {/* Confirm Modal */}
          {confirmAction && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-[60]">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-sm p-5 text-center">
                <p className="text-gray-800 mb-5">{confirmAction.message}</p>
                <div className="flex justify-center gap-3">
                  <button onClick={() => setConfirmAction(null)} className="px-5 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">
                    取消
                  </button>
                  <button onClick={() => { confirmAction.action(); setConfirmAction(null); }} className="px-5 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors">
                    確定
                  </button>
                </div>
              </div>
            </div>
          )}
        </React.Fragment>
      );

      if (loading) {
        return (
          <div className="min-h-screen bg-gray-50 flex items-center justify-center">
            <div className="text-gray-500 flex flex-col items-center gap-4">
              <svg className="animate-spin h-10 w-10 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              <p className="font-medium text-lg">載入資料中...</p>
            </div>
          </div>
        );
      }

      // 1. 旅程列表畫面 (Dashboard)
      if (!activeTripId || !activeTrip) {
        return (
          <div className="min-h-screen bg-gray-50 p-4 md:p-8 font-sans">
            <div className="max-w-3xl mx-auto">
              <div className="flex justify-between items-center mb-8">
                <h1 className="text-2xl md:text-3xl font-bold text-gray-800 flex items-center gap-2">
                  <MapIcon className="text-blue-600" size={28} />
                  我的旅程記帳
                </h1>
                <button 
                  onClick={() => setIsTripModalOpen(true)}
                  className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow-sm flex items-center gap-2 transition-colors"
                >
                  <Plus size={20} />
                  <span className="hidden sm:inline">新增旅程</span>
                </button>
              </div>

              {trips.length === 0 ? (
                <div className="text-center py-20 bg-white rounded-xl shadow-sm border border-gray-100">
                  <MapIcon size={48} className="mx-auto text-gray-300 mb-4" />
                  <p className="text-gray-500 text-lg">目前還沒有任何旅程，趕快新增一個吧！</p>
                </div>
              ) : (
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {trips.map(trip => {
                    const totals = getTripListTotals(trip);
                    return (
                      <div 
                        key={trip.id} 
                        className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow cursor-pointer relative group flex flex-col h-full"
                        onClick={() => setActiveTripId(trip.id)}
                      >
                        <button 
                          onClick={(e) => { e.stopPropagation(); deleteTrip(trip.id); }}
                          className="absolute top-4 right-4 text-gray-400 hover:text-red-500 md:opacity-0 md:group-hover:opacity-100 transition-opacity"
                          title="刪除旅程"
                        >
                          <Trash2 size={18} />
                        </button>
                        <h2 className="text-xl font-bold text-gray-800 mb-2 pr-8 truncate">{trip.name}</h2>
                        <div className="flex flex-col gap-2 text-sm text-gray-600 flex-1">
                          <div className="flex items-center gap-2">
                            <Users size={16} className="text-gray-400" />
                            <span>{trip.participants.length} 人參與</span>
                          </div>
                          <div className="flex items-start gap-2">
                            <DollarSign size={16} className="text-gray-400 mt-0.5 flex-shrink-0" />
                            <div className="flex flex-wrap gap-1">
                              {trip.currencies.map(c => (
                                <span key={c} className="bg-gray-100 text-gray-600 px-2 py-0.5 rounded text-xs">{c}</span>
                              ))}
                            </div>
                          </div>
                        </div>
                        <div className="mt-4 pt-3 border-t border-gray-50 flex flex-col gap-1">
                          <span className="text-gray-500 text-sm mb-1">總花費</span>
                          {Object.entries(totals).map(([curr, amount]) => (
                            <div key={curr} className="flex justify-between items-center">
                              <span className="text-xs text-gray-400">{curr}</span>
                              <span className="font-semibold text-blue-600">
                                {amount.toLocaleString()}
                              </span>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* 新增旅程 Modal */}
            {isTripModalOpen && (
              <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden">
                  <div className="p-5 border-b flex justify-between items-center bg-gray-50">
                    <h3 className="text-lg font-bold text-gray-800">新增旅程</h3>
                    <button onClick={() => setIsTripModalOpen(false)} className="text-gray-400 hover:text-gray-600">
                      <X size={20} />
                    </button>
                  </div>
                  <div className="p-5 space-y-5">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">旅程名稱</label>
                      <input 
                        type="text" 
                        value={tripForm.name}
                        onChange={(e) => setTripForm({...tripForm, name: e.target.value})}
                        placeholder="例如：京阪神八日遊"
                        className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-2">使用幣值 (可複選)</label>
                      <div className="flex flex-wrap gap-2">
                        {CURRENCIES.map(c => {
                          const isSelected = tripForm.currencies.includes(c);
                          return (
                            <button
                              key={c}
                              type="button"
                              onClick={() => toggleCurrency(c)}
                              className={`flex items-center gap-1 px-3 py-1.5 rounded-lg border text-sm transition-colors ${
                                isSelected 
                                  ? 'bg-blue-50 border-blue-200 text-blue-700 font-medium' 
                                  : 'bg-white border-gray-200 text-gray-600 hover:bg-gray-50'
                              }`}
                            >
                              {isSelected && <Check size={14} className="text-blue-600" />}
                              {c}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1 flex justify-between items-center">
                        <span>參與者名稱</span>
                        <span className="text-xs text-gray-500 font-normal">共 {tripForm.participants.length} 人</span>
                      </label>
                      <div className="space-y-2 max-h-40 overflow-y-auto p-1">
                        {tripForm.participants.map((participant, index) => (
                          <div key={index} className="flex gap-2">
                            <input 
                              type="text" 
                              value={participant}
                              onChange={(e) => handleParticipantChange(index, e.target.value)}
                              placeholder={`成員 ${index + 1}`}
                              className="flex-1 border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                            />
                            <button 
                              onClick={() => handleRemoveParticipant(index)}
                              className="p-2 text-gray-400 hover:text-red-500 disabled:opacity-30"
                              disabled={tripForm.participants.length <= 1}
                            >
                              <Trash2 size={18} />
                            </button>
                          </div>
                        ))}
                      </div>
                      <button 
                        onClick={handleAddParticipant}
                        className="mt-2 text-sm text-blue-600 hover:text-blue-800 flex items-center gap-1 font-medium"
                      >
                        <Plus size={16} /> 新增參與者
                      </button>
                    </div>
                  </div>
                  <div className="p-5 border-t bg-gray-50 flex justify-end gap-3">
                    <button 
                      onClick={() => setIsTripModalOpen(false)}
                      className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded-lg transition-colors"
                    >
                      取消
                    </button>
                    <button 
                      onClick={saveTrip}
                      className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow-sm transition-colors"
                    >
                      建立旅程
                    </button>
                  </div>
                </div>
              </div>
            )}
            
            {renderModals()}
          </div>
        );
      }

      // 2. 單一旅程詳細畫面 (Active Trip View)
      return (
        <div className="min-h-screen bg-gray-50 pb-24 font-sans">
          {/* 頂部導覽列 */}
          <div className="bg-white border-b sticky top-0 z-10 shadow-sm">
            <div className="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
              <button 
                onClick={() => setActiveTripId(null)}
                className="flex items-center gap-2 text-gray-600 hover:text-gray-900 transition-colors"
              >
                <ArrowLeft size={20} />
                <span className="font-medium hidden sm:inline">返回列表</span>
              </button>
              <h1 className="text-xl font-bold text-gray-800 truncate px-4">{activeTrip.name}</h1>
              <div className="w-8"></div> {/* 平衡用 */}
            </div>
          </div>

          <div className="max-w-3xl mx-auto px-4 py-6">
            {/* 統計卡片 (支援多幣值顯示) */}
            <div className="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl shadow-lg p-6 mb-8 text-white">
              <div className="space-y-4">
                {Object.entries(tripStats).map(([curr, stat], index) => (
                  <div key={curr} className={`grid grid-cols-2 gap-4 divide-x divide-white/20 ${index > 0 ? 'pt-4 border-t border-white/20' : ''}`}>
                    <div>
                      <p className="text-blue-100 text-xs font-medium mb-1">總花費 ({curr})</p>
                      <div className="flex items-baseline gap-1">
                        <span className="text-2xl sm:text-3xl font-bold truncate">{stat.total.toLocaleString()}</span>
                      </div>
                    </div>
                    <div className="pl-4">
                      <p className="text-blue-100 text-xs font-medium mb-1 flex items-center gap-1">
                        <span>平均每人 ({curr})</span>
                        <span className="text-[10px] opacity-70">/{activeTrip.participants.length}人</span>
                      </p>
                      <div className="flex items-baseline gap-1">
                        <span className="text-2xl sm:text-3xl font-bold truncate">{Math.round(stat.average).toLocaleString()}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <div className="mt-5 pt-4 border-t border-white/20 text-sm text-blue-100 flex items-center justify-between pb-1">
                <div className="flex items-center gap-2 overflow-x-auto whitespace-nowrap">
                  <Users size={16} />
                  參與者：{activeTrip.participants.join(', ')}
                </div>
                <button 
                  onClick={openParticipantModal}
                  className="p-1.5 bg-white/10 hover:bg-white/20 rounded-lg transition-colors flex-shrink-0"
                  title="管理參與者"
                >
                  <Edit2 size={14} />
                </button>
              </div>
            </div>

            {/* 明細列表 */}
            <div className="flex justify-between items-end mb-4">
              <h2 className="text-lg font-bold text-gray-800">消費明細</h2>
            </div>

            {activeTrip.expenses.length === 0 ? (
              <div className="text-center py-16 bg-white rounded-xl shadow-sm border border-gray-100">
                <DollarSign size={40} className="mx-auto text-gray-300 mb-3" />
                <p className="text-gray-500">這個旅程還沒有任何消費記錄</p>
              </div>
            ) : (
              <div className="space-y-3">
                {activeTrip.expenses.map(expense => (
                  <div key={expense.id} className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 hover:shadow-md transition-shadow flex items-center gap-4">
                    {getCategoryIcon(expense.category)}
                    
                    <div className="flex-1 min-w-0">
                      <div className="flex justify-between items-start mb-1">
                        <h3 className="font-semibold text-gray-800 truncate pr-2">{expense.name}</h3>
                        <div className="text-right flex-shrink-0">
                          <span className="font-bold text-gray-800">{expense.amount.toLocaleString()}</span>
                          <span className="text-xs text-gray-500 ml-1">{expense.currency}</span>
                        </div>
                      </div>
                      <div className="flex items-center gap-3 text-xs text-gray-500">
                        <span className="flex items-center gap-1 bg-gray-100 px-2 py-0.5 rounded text-gray-600">
                          <Users size={12} /> {expense.payer} 支付
                        </span>
                        <span className="flex items-center gap-1">
                          <Calendar size={12} /> {expense.date}
                        </span>
                      </div>
                    </div>

                    <div className="flex items-center gap-1 flex-shrink-0 border-l pl-3 ml-2">
                      <button 
                        onClick={() => openExpenseModal(expense)}
                        className="p-2 text-gray-400 hover:text-blue-600 transition-colors"
                      >
                        <Edit2 size={16} />
                      </button>
                      <button 
                        onClick={() => deleteExpense(expense.id)}
                        className="p-2 text-gray-400 hover:text-red-500 transition-colors"
                      >
                        <Trash2 size={16} />
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* 懸浮新增按鈕 (Floating Action Button) */}
          <button 
            onClick={() => openExpenseModal()}
            className="fixed bottom-6 right-6 md:bottom-10 md:right-10 bg-blue-600 hover:bg-blue-700 text-white rounded-full p-4 shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all"
          >
            <Plus size={28} />
          </button>

          {/* 新增/編輯明細 Modal */}
          {isExpenseModalOpen && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
                <div className="p-5 border-b flex justify-between items-center bg-gray-50 flex-shrink-0">
                  <h3 className="text-lg font-bold text-gray-800">
                    {expenseForm.id ? '編輯消費明細' : '新增消費明細'}
                  </h3>
                  <button onClick={() => setIsExpenseModalOpen(false)} className="text-gray-400 hover:text-gray-600">
                    <X size={20} />
                  </button>
                </div>
                
                <div className="p-5 space-y-4 overflow-y-auto">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">消費名稱</label>
                    <input 
                      type="text" 
                      value={expenseForm.name}
                      onChange={(e) => setExpenseForm({...expenseForm, name: e.target.value})}
                      placeholder="例如：晚餐、計程車"
                      className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    />
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">
                        金額
                      </label>
                      <div className="flex">
                        <input 
                          type="number" 
                          min="0"
                          value={expenseForm.amount}
                          onChange={(e) => setExpenseForm({...expenseForm, amount: e.target.value})}
                          placeholder="0"
                          className="w-full border border-gray-300 border-r-0 rounded-l-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                        />
                        <select
                          value={expenseForm.currency}
                          onChange={(e) => setExpenseForm({...expenseForm, currency: e.target.value})}
                          className="border border-gray-300 rounded-r-lg px-2 py-2 bg-gray-50 text-gray-700 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                        >
                          {activeTrip.currencies.map(c => (
                            <option key={c} value={c}>{c}</option>
                          ))}
                        </select>
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">消費日期</label>
                      <input 
                        type="date" 
                        value={expenseForm.date}
                        onChange={(e) => setExpenseForm({...expenseForm, date: e.target.value})}
                        className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                      />
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">支出人 (誰付的錢)</label>
                    <select 
                      value={expenseForm.payer}
                      onChange={(e) => setExpenseForm({...expenseForm, payer: e.target.value})}
                      className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white"
                    >
                      <option value="" disabled>請選擇支出人</option>
                      {activeTrip.participants.map(p => (
                        <option key={p} value={p}>{p}</option>
                      ))}
                    </select>
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">分類</label>
                    <div className="grid grid-cols-3 gap-2">
                      {CATEGORIES.map(cat => {
                        const isSelected = expenseForm.category === cat.name;
                        const IconComponent = cat.icon;
                        return (
                          <button
                            key={cat.name}
                            onClick={() => setExpenseForm({...expenseForm, category: cat.name})}
                            className={`flex flex-col items-center justify-center py-2 px-1 rounded-lg border-2 transition-all ${
                              isSelected 
                                ? 'border-blue-500 bg-blue-50 text-blue-700' 
                                : 'border-gray-100 hover:border-gray-200 text-gray-600'
                            }`}
                          >
                            <IconComponent size={20} className={isSelected ? 'text-blue-500 mb-1' : 'text-gray-400 mb-1'} />
                            <span className="text-xs font-medium">{cat.name}</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                </div>

                <div className="p-5 border-t bg-gray-50 flex justify-end gap-3 flex-shrink-0">
                  <button 
                    onClick={() => setIsExpenseModalOpen(false)}
                    className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded-lg transition-colors"
                  >
                    取消
                  </button>
                  <button 
                    onClick={saveExpense}
                    className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow-sm transition-colors"
                  >
                    儲存明細
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* 管理參與者 Modal */}
          {isParticipantModalOpen && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
                <div className="p-5 border-b flex justify-between items-center bg-gray-50 flex-shrink-0">
                  <h3 className="text-lg font-bold text-gray-800">管理參與者</h3>
                  <button onClick={() => setIsParticipantModalOpen(false)} className="text-gray-400 hover:text-gray-600">
                    <X size={20} />
                  </button>
                </div>
                
                <div className="p-5 space-y-4 overflow-y-auto">
                  <div className="bg-blue-50 text-blue-700 p-3 rounded-lg text-sm mb-2">
                    💡 修改名稱會自動更新該成員已建立的消費明細。若刪除成員，該成員原有的消費明細會保留原名稱。
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2 flex justify-between items-center">
                      <span>參與者名單</span>
                      <span className="text-xs text-gray-500 font-normal">共 {editingParticipants.length} 人</span>
                    </label>
                    <div className="space-y-2">
                      {editingParticipants.map((participant, index) => (
                        <div key={index} className="flex gap-2">
                          <input 
                            type="text" 
                            value={participant.current}
                            onChange={(e) => handleEditParticipantChange(index, e.target.value)}
                            placeholder={`成員 ${index + 1}`}
                            className="flex-1 border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                          />
                          <button 
                            onClick={() => handleRemoveEditParticipant(index)}
                            className="p-2 text-gray-400 hover:text-red-500 disabled:opacity-30"
                            disabled={editingParticipants.length <= 1}
                          >
                            <Trash2 size={18} />
                          </button>
                        </div>
                      ))}
                    </div>
                    <button 
                      onClick={handleAddEditParticipant}
                      className="mt-3 text-sm text-blue-600 hover:text-blue-800 flex items-center gap-1 font-medium"
                    >
                      <Plus size={16} /> 新增參與者
                    </button>
                  </div>
                </div>

                <div className="p-5 border-t bg-gray-50 flex justify-end gap-3 flex-shrink-0">
                  <button 
                    onClick={() => setIsParticipantModalOpen(false)}
                    className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded-lg transition-colors"
                  >
                    取消
                  </button>
                  <button 
                    onClick={saveParticipants}
                    className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow-sm transition-colors"
                  >
                    儲存變更
                  </button>
                </div>
              </div>
            </div>
          )}

          {renderModals()}
        </div>
      );
    }

    // 檢查環境變數並初始化 Firebase 與 React
    const renderApp = () => {
      // ==========================================
      // ⚠️ 部署到您自己的網站 (如 GitHub Pages) 時：
      // 1. 將 isCustomDeploy 設為 true
      // 2. 填入您自己的 Firebase 設定
      // ==========================================
      const isCustomDeploy = true; 

      let firebaseConfig;

      if (isCustomDeploy) {
        // 請填入您的 Firebase 設定 (從 Firebase 控制台的「專案設定」取得)
        firebaseConfig = {
          apiKey: "AIzaSyCauUYMMq70Nadu4ahrTBkg5WQ0y5xjN98",
          authDomain: "travel-db-479f6.firebaseapp.com",
          projectId: "travel-db-479f6",
          storageBucket: "travel-db-479f6.firebasestorage.app",
          messagingSenderId: "492993282647",
          appId: "1:492993282647:web:6cc1036ed3bda5c40bd912"
        };
      } else {
        // 預覽環境使用的自動設定
        firebaseConfig = { projectId: "demo" };
        try {
          if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
          }
        } catch (e) {
          console.error("Parse config error", e);
        }
      }
      
      const app = window.FirebaseUtils.initializeApp(firebaseConfig);
      window.auth = window.FirebaseUtils.getAuth(app);
      window.db = window.FirebaseUtils.getFirestore(app);
      window.appId = typeof __app_id !== 'undefined' && !isCustomDeploy ? __app_id : 'my-travel-tracker';

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<TravelExpenseTracker />);
    };

    if (window.FirebaseUtils) {
      renderApp();
    } else {
      window.addEventListener('firebase-ready', renderApp);
    }
  </script>
</body>
</html>
